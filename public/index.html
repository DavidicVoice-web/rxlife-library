<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RxLife Network</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1a2b3c;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #0f4b6e;
      color: white;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .search-box {
      display: flex;
      gap: 8px;
    }

    .search-box input {
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    .search-box select {
      padding: 6px;
      border-radius: 6px;
    }

    .container {
      padding: 20px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .card h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .card p {
      font-size: 12px;
      color: #555;
    }

    .bottom-menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ddd;
    }

    .menu-item {
      font-size: 12px;
      text-align: center;
      cursor: pointer;
    }

    .menu-item:hover {
      color: #0f4b6e;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">RxLife Network</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search..." />
      <select id="filter">
        <option value="all">All</option>
        <option value="books">Books</option>
        <option value="videos">Videos</option>
        <option value="images">Images</option>
        <option value="courses">Courses</option>
      </select>
    </div>
  </div>

  <!-- Content -->
  <div class="container">
    <div class="section-title">Latest Resources</div>

    <div id="content" class="card-grid">
      <!-- Dynamic content loads here -->
    </div>
  </div>

  <!-- Bottom Menu -->
  <div class="bottom-menu">
    <div class="menu-item" onclick="loadSection('books')">Books</div>
    <div class="menu-item" onclick="loadSection('videos')">Videos</div>
    <div class="menu-item" onclick="loadSection('images')">Images</div>
    <div class="menu-item" onclick="loadSection('courses')">Courses</div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
