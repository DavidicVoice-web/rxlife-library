<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RxLife Network Library</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <div class="logo">
                <img src="/logo.png" alt="RxLife" onerror="this.style.display='none'">
                <h1>RxLife</h1>
            </div>
            <div class="search-area">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="globalSearch" placeholder="Search books, videos, courses...">
                    <select id="searchFilter">
                        <option value="">All</option>
                        <option value="books">Books</option>
                        <option value="videos">Videos</option>
                        <option value="images">Images</option>
                        <option value="dictionary">Dictionary</option>
                        <option value="courses">Courses</option>
                    </select>
                    <button id="searchBtn"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
            <div class="user-area" id="userArea">
                <button id="loginBtn" class="user-btn"><i class="fas fa-user"></i> Login</button>
                <button id="signupBtn" class="user-btn"><i class="fas fa-user-plus"></i> Sign Up</button>
            </div>
        </div>

        <div id="mainContent" class="content">
            <div class="loading">Loading...</div>
        </div>

        <!-- Haptic Arc Bottom Menu (hidden by default, appears on swipe up) -->
        <div id="bottomMenu" class="bottom-menu">
            <div class="menu-items">
                <button class="menu-item" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
                <button class="menu-item" data-tab="books"><i class="fas fa-book"></i><span>Books</span></button>
                <button class="menu-item" data-tab="videos"><i class="fas fa-video"></i><span>Videos</span></button>
                <button class="menu-item" data-tab="images"><i class="fas fa-image"></i><span>Images</span></button>
                <button class="menu-item" data-tab="dictionary"><i class="fas fa-graduation-cap"></i><span>Dictionary</span></button>
                <button class="menu-item" data-tab="courses"><i class="fas fa-chalkboard-user"></i><span>Courses</span></button>
                <button class="menu-item" data-tab="upload" id="uploadTabBtn"><i class="fas fa-upload"></i><span>Upload</span></button>
                <button class="menu-item" data-tab="profile" id="profileTabBtn"><i class="fas fa-user-circle"></i><span>Profile</span></button>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
