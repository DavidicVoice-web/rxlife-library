<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Admin Panel</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <div class="login-container">\n        <h2>Admin Login</h2>\n        <form action="#" method="POST">\n            <label for="username">Username:</label>\n            <input type="text" id="username" name="username" required>\n            <label for="password">Password:</label>\n            <input type="password" id="password" name="password" required>\n            <button type="submit">Login</button>\n        </form>\n    </div>\n    <div class="tabs">\n        <button onclick="openTab('pendingUploads')">Pending Uploads</button>\n        <button onclick="openTab('requests')">Requests</button>\n        <button onclick="openTab('resources')">Resources</button>\n        <button onclick="openTab('addNew')">Add New</button>\n    </div>\n    <div id="pendingUploads" class="tab-content">\n        <h3>Pending Uploads</h3>\n        <!-- content for pending uploads -->\n    </div>\n    <div id="requests" class="tab-content">\n        <h3>Requests</h3>\n        <!-- content for requests -->\n    </div>\n    <div id="resources" class="tab-content">\n        <h3>Resources</h3>\n        <!-- content for resources -->\n    </div>\n    <div id="addNew" class="tab-content">\n        <h3>Add New</h3>\n        <!-- content for adding new resources -->\n    </div>\n    <script>\n        function openTab(tabName) {\n            var i;\n            var tabcontent = document.getElementsByClassName("tab-content");\n            for (i = 0; i < tabcontent.length; i++) {\n                tabcontent[i].style.display = "none";\n            }\n            document.getElementById(tabName).style.display = "block";\n        }\n    </script>\n</body>\n</html>
